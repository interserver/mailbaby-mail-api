openapi: 3.0.3
info:
    title: MailBaby Email Delivery and Management Service API
    version: 1.4.0
    description: >
        **Send emails fast and with confidence through our easy to use
        [REST](https://en.wikipedia.org/wiki/Representational_state_transfer) API interface.**


        # Overview


        This is the API interface to the [Mail Baby](https://mail.baby/) Mail services provided by
        [InterServer](https://www.interserver.net). To use this service you must have an account with us at
        [my.interserver.net](https://my.interserver.net).


        # Mail Orders


        Every sending account in MailBaby is backed by a **Mail Order** — a provisioned sending credential
        with a numeric `id` and a corresponding SMTP username (`mb<id>`).  Most calls accept an optional
        `id` parameter; when omitted the API automatically selects the first active order on your account.
        Use `GET /mail` to list all orders, and `GET /mail/{id}` to inspect a single order including its
        current SMTP password.


        # Sending Email


        Three sending methods are available depending on your use-case:

        | Endpoint | Best for |
        |----------|----------|
        | `POST /mail/send` | Simple single-recipient messages |
        | `POST /mail/advsend` | Multiple recipients, CC/BCC, attachments, named contacts |
        | `POST /mail/rawsend` | Pre-built RFC 822 messages (e.g. DKIM-signed payloads) |


        After a successful send each endpoint returns a `GenericResponse` whose `text` field contains the
        **transaction ID** assigned by the relay.  This ID can later be matched against entries in
        `GET /mail/log` via the `mailid` query parameter.


        # Filtering & Logs


        `GET /mail/log` provides paginated access to every message accepted by the relay for your
        account.  Combine any of the query parameters to narrow results — e.g. `from`, `to`, `subject`,
        `messageId`, `origin`, `mx`, `startDate`/`endDate`, and `delivered`.


        # Blocking


        Two independent mechanisms exist for suppressing unwanted email:

        - **Block lists** (`GET /mail/blocks`, `POST /mail/blocks/delete`) — addresses flagged by the
          system spam filters (LOCAL_BL_RCPT / MBTRAP rules in rspamd, and suspicious subjects).
        - **Deny rules** (`GET /mail/rules`, `POST /mail/rules`, `DELETE /mail/rules/{ruleId}`) —
          custom rules you configure to reject specific senders, domains, destination addresses, or
          subject-line prefixes before a message is even attempted.


        # Authentication


        In order to use most of the API calls you must pass credentials from the
        [my.interserver.net](https://my.interserver.net/) site.

        We support several different authentication methods but the preferred method is to use the **API Key**
        which you can get from the [Account Security](https://my.interserver.net/account_security) page.

        Pass your key in the `X-API-KEY` HTTP request header for every protected call.
    termsOfService: 'https://www.interserver.net/terms-of-service.html'
    contact:
        name: Mail Baby
        url: 'https://www.mail.baby/contact/'
        email: support@interserver.net
    license:
        name: GNU GPLv3
        url: 'https://www.gnu.org/licenses/gpl.txt'
servers:
    -
        url: 'https://api.mailbaby.net'
        description: Live API Endpoint
paths:
    /ping:
        get:
            tags:
                - Status
            responses:
                '200':
                    description: Server is up and running
                default:
                    description: Something is wrong
            operationId: pingServer
            summary: Checks if the server is running
            description: >
                A lightweight health-check endpoint.  Returns a plain-text `200 OK` when the API
                server is reachable.  No authentication is required.  Useful for monitoring and
                uptime checks.
    /mail:
        get:
            tags:
                - Services
            summary: Displays a list of mail service orders
            description: >
                Returns every mail order (active **and** inactive) associated with your account.
                Each record includes the numeric `id`, the `status` (`active` or `canceled`), the
                SMTP `username` (always `mb<id>`), and an optional human-readable `comment`.


                The `id` values returned here are used as the `id` input parameter on all sending
                endpoints (`/mail/send`, `/mail/advsend`, `/mail/rawsend`) as well as the log and
                stats queries.  When the `id` parameter is omitted on those calls the API
                automatically picks the **first active** order returned by this endpoint.


                To retrieve full details — including the current SMTP password — for a single order
                use `GET /mail/{id}`.
            operationId: getMailOrders
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/MailOrder'
                            examples:
                                MailOrders:
                                    value:
                                        -
                                            id: 39
                                            status: active
                                            username: mb39
                                        -
                                            id: 33
                                            status: canceled
                                            username: mb33
                                            comment: test order
                    links:
                        getMailOrderById:
                            operationId: getMailOrderById
                            parameters:
                                id: '$response.body#/0/id'
                            description: >-
                                The `id` value returned in the response can be used as the `id`
                                path parameter in `GET /mail/{id}` to retrieve full order details.
                        sendMailByIdLink:
                            operationId: sendMail
                            parameters:
                                id: '$response.body#/0/id'
                            description: >-
                                The `id` value returned in the response can be used as the `id`
                                body parameter in `POST /mail/send`.
                        sendAdvMailByIdLink:
                            operationId: sendAdvMail
                            parameters:
                                id: '$response.body#/0/id'
                            description: >-
                                The `id` value returned in the response can be used as the `id`
                                body parameter in `POST /mail/advsend`.
                        viewMailLogByIdLink:
                            operationId: viewMailLog
                            parameters:
                                id: '$response.body#/0/id'
                            description: >-
                                The `id` value returned in the response can be used as the `id`
                                query parameter in `GET /mail/log`.
                        getStatsByIdLink:
                            operationId: getStats
                            parameters:
                                id: '$response.body#/0/id'
                            description: >-
                                The `id` value returned in the response can be used as the `id`
                                query parameter in `GET /mail/stats`.
                '401':
                    $ref: '#/components/responses/Unauthorized'
    '/mail/{id}':
        get:
            tags:
                - Services
            summary: Displays details for a single mail order
            description: >
                Returns the full detail record for one specific mail order identified by its
                numeric `id`.  In addition to the fields returned by `GET /mail`, this endpoint
                also includes the current **SMTP password** for the order.


                The `username` and `password` values returned here can be used directly to
                authenticate against `relay.mailbaby.net:25` (SMTP AUTH) if you need to send
                email via a native SMTP client rather than through the REST API.


                The `id` path parameter is the same integer `id` value returned by `GET /mail`.
            operationId: getMailOrderById
            parameters:
                -
                    name: id
                    in: path
                    required: true
                    description: The numeric ID of the mail order.
                    schema:
                        type: integer
                        format: int64
                    example: 39
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MailOrderDetail'
                            examples:
                                MailOrderDetail:
                                    value:
                                        id: 39
                                        status: active
                                        username: mb39
                                        password: s3cr3tpassword
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
    /mail/send:
        post:
            tags:
                - Sending
            summary: Sends an Email
            description: >
                Sends an email through one of your mail orders using a simple flat set of fields.
                This is the quickest way to send a single-recipient plain-text or HTML message.


                **HTML detection** is automatic — if the `body` value contains any HTML tags the
                message will be sent as `text/html`; otherwise it is sent as `text/plain`.


                The `from` address is also automatically set as the `Reply-To` header.


                *Note*: If you need to send to multiple recipients, add CC/BCC, or include file
                attachments, use `POST /mail/advsend` instead.  If you have a pre-built RFC 822
                message (e.g. already DKIM-signed), use `POST /mail/rawsend`.


                On success the response `text` field contains the relay transaction ID.  This ID
                can be used with `GET /mail/log` (via the `mailid` query parameter) to look up the
                delivery record.
            operationId: sendMail
            requestBody:
                required: true
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            $ref: '#/components/schemas/SendMail'
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SendMail'
            responses:
                '200':
                    description: Email accepted for delivery
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GenericResponse'
                            examples:
                                SendSuccess:
                                    value:
                                        status: ok
                                        text: 185caa69ff7000f47c
                    links:
                        lookupByTransactionId:
                            operationId: viewMailLog
                            parameters:
                                mailid: '$response.body#/text'
                            description: >-
                                The transaction ID in `text` can be passed as `mailid` to
                                `GET /mail/log` to retrieve the delivery record.
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
    /mail/rawsend:
        post:
            tags:
                - Sending
            summary: Sends a raw RFC 822 email
            description: >
                Accepts a complete, pre-built RFC 822 email message (headers + body) as a string
                and injects it into the relay without any modification.


                This endpoint is particularly useful when the message has already been
                **DKIM-signed** — because the relay transmits the exact bytes you provide, the
                DKIM signature remains intact.  If you use the other sending endpoints the relay
                may add or reorder headers, breaking an existing signature.


                The `From` and recipient addresses are parsed automatically from the message
                headers (`From`, `To`, `Cc`, `Bcc`).  You do **not** need to specify them
                separately.


                If an `id` is provided it must correspond to an active mail order on your account.
                If omitted, the first active order is selected automatically.  The SMTP
                credentials for the selected order are used to authenticate with the relay.


                On success the response `text` field contains the relay transaction ID.  This ID
                can be used with `GET /mail/log` (via the `mailid` query parameter) to look up the
                delivery record.
            operationId: rawMail
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SendMailRaw'
                    multipart/form-data:
                        schema:
                            $ref: '#/components/schemas/SendMailRaw'
            responses:
                '200':
                    description: Email accepted for delivery
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GenericResponse'
                            examples:
                                RawSendSuccess:
                                    value:
                                        status: ok
                                        text: 185caa69ff7000f47c
                    links:
                        lookupByTransactionId:
                            operationId: viewMailLog
                            parameters:
                                mailid: '$response.body#/text'
                            description: >-
                                The transaction ID in `text` can be passed as `mailid` to
                                `GET /mail/log` to retrieve the delivery record.
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
    /mail/advsend:
        post:
            tags:
                - Sending
            summary: Sends an Email with Advanced Options
            description: >
                Sends an email through one of your mail orders with full control over recipients,
                headers, and attachments.  Supports multiple To / CC / BCC addresses, named
                contacts, Reply-To overrides, and base64-encoded file attachments.


                **Content-type flexibility** — the request body may be submitted as either
                `application/x-www-form-urlencoded` or `application/json`.  When using form
                encoding, address fields (`from`, `to`, `replyto`, `cc`, `bcc`) accept both a
                plain RFC 822 comma-separated string (e.g. `"Joe <joe@example.com>, jane@example.com"`)
                and the structured `[{"email":"...","name":"..."}]` array format.  When using JSON,
                both formats are equally supported.


                **HTML detection** is automatic — if `body` contains HTML tags the
                `Content-Type` is set to `text/html`; otherwise `text/plain`.


                **Attachments** must be base64-encoded.  Each attachment requires at least a
                `data` field; the optional `filename` field controls the attachment name shown
                to recipients.


                If an `id` is provided it must correspond to an active mail order on your account.
                If omitted, the first active order is selected automatically.


                On success the response `text` field contains the relay transaction ID which can
                be looked up in `GET /mail/log` via the `mailid` query parameter.


                ## Examples


                ### Form — basic string addresses

                ```sh
                curl -X POST https://api.mailbaby.net/mail/advsend \
                  -H 'X-API-KEY: YOUR_API_KEY' \
                  -H 'Content-Type: application/x-www-form-urlencoded' \
                  -d 'subject=Welcome' \
                  -d 'body=Hello' \
                  -d from=user@domain.com \
                  -d to=support@interserver.net
                ```

                ### Form — RFC 822 named addresses

                ```sh
                curl -X POST https://api.mailbaby.net/mail/advsend \
                  -H 'X-API-KEY: YOUR_API_KEY' \
                  -H 'Content-Type: application/x-www-form-urlencoded' \
                  -d 'subject=Welcome' \
                  -d 'body=Hello' \
                  -d 'from=Joe <user@domain.com>' \
                  -d 'to=Jane <support@interserver.net>'
                ```

                ### Form — multiple recipients as array

                ```sh
                curl -X POST https://api.mailbaby.net/mail/advsend \
                  -H 'X-API-KEY: YOUR_API_KEY' \
                  -H 'Content-Type: application/x-www-form-urlencoded' \
                  -d 'subject=Welcome' -d 'body=Hello' \
                  -d from=user@domain.com \
                  -d 'to[0][name]=Joe' -d 'to[0][email]=support@interserver.net' \
                  -d 'to[1][name]=Jane' -d 'to[1][email]=jane@interserver.net'
                ```

                ### JSON — structured objects

                ```sh
                curl -X POST https://api.mailbaby.net/mail/advsend \
                  -H 'X-API-KEY: YOUR_API_KEY' \
                  -H 'Content-Type: application/json' \
                  -d '{
                    "subject": "Welcome",
                    "body": "<h1>Hello</h1>",
                    "from": {"email": "user@domain.com", "name": "Sender Name"},
                    "to": [{"email": "joe@client.com", "name": "Joe Client"}],
                    "cc": [{"email": "manager@client.com"}],
                    "attachments": [{"filename": "report.pdf", "data": "BASE64_DATA"}]
                  }'
                ```
            operationId: sendAdvMail
            requestBody:
                required: true
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            $ref: '#/components/schemas/SendMailAdv'
                        examples:
                            BasicForm:
                                summary: Simple string addresses
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from: user@domain.com
                                    to: support@interserver.net
                            NamedForm:
                                summary: RFC 822 named addresses
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from: 'Joe <user@domain.com>'
                                    to: 'Jane <support@interserver.net>'
                            AdvSendExample:
                                summary: Structured array with attachment
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from:
                                        email: user@domain.com
                                    to:
                                        -
                                            email: someone@client.com
                                            name: Mr Client
                                    attachments:
                                        -
                                            filename: message.txt
                                            data: base64_encoded_contents
                                    id: 66
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SendMailAdv'
                        examples:
                            BasicJson:
                                summary: Plain string addresses
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from: user@domain.com
                                    to: support@interserver.net
                            ArrayJson:
                                summary: Structured objects
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from:
                                        name: Joe
                                        email: user@domain.com
                                    to:
                                        -
                                            name: Joe
                                            email: support@interserver.net
                            NameEmailJson:
                                summary: RFC 822 named string
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from: 'Joe <user@domain.com>'
                                    to: 'Joe <support@interserver.net>'
                            FullExample:
                                summary: Full-featured with CC, attachment, id
                                value:
                                    subject: Welcome
                                    body: Hello
                                    from:
                                        email: user@domain.com
                                        name: Sender Name
                                    to:
                                        -
                                            email: someone@client.com
                                            name: Mr Client
                                    cc:
                                        -
                                            email: someone2@client.com
                                            name: Mr Second
                                    bcc:
                                        -
                                            email: archive@company.com
                                    replyto:
                                        -
                                            email: replies@domain.com
                                    attachments:
                                        -
                                            filename: message.txt
                                            data: base64_encoded_contents
                                    id: 66
            responses:
                '200':
                    description: Email accepted for delivery
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GenericResponse'
                            examples:
                                SendSuccess:
                                    value:
                                        status: ok
                                        text: 185caa69ff7000f47c
                    links:
                        lookupByTransactionId:
                            operationId: viewMailLog
                            parameters:
                                mailid: '$response.body#/text'
                            description: >-
                                The transaction ID in `text` can be passed as `mailid` to
                                `GET /mail/log` to retrieve the delivery record.
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
    /mail/log:
        get:
            tags:
                - History
            summary: Displays the mail log
            description: >
                Returns a paginated list of every email message accepted by the relay for your
                mail account(s).  All filter parameters are optional and combinable.


                **Row grouping** is controlled by the `groupby` parameter.  By default
                (`groupby=recipient`), the response contains one row per delivery attempt — so
                a single message sent to 4 recipients produces 4 rows, each with its own
                `recipient`, `delivered`, `response`, and `mxHostname` values.  Set
                `groupby=message` to collapse to one row per message (delivery fields will
                reflect one arbitrary recipient).


                **Pagination** is controlled by `skip` and `limit`.  The `total` in the
                response reflects the row count **after** grouping, so it matches the number
                of pages you need to fetch.


                **Date filtering** accepts either a Unix timestamp (integer) or a date string
                parseable by PHP `strtotime()` such as `2024-01-15`, `last monday`, or
                `2024-01-01 00:00:00`.  Examples:
                `startDate=1704067200&endDate=1706745599` or
                `startDate=2024-01-01&endDate=2024-01-31`.


                **Sorting** is controlled by `sort` and `dir`.  Currently the only sort key
                is `time` (default), which orders by internal row ID.


                **Delivery status** can be filtered with the `delivered` parameter:
                `delivered=1` returns only successfully delivered messages;
                `delivered=0` returns messages still in queue or that failed.


                **Address filtering** distinguishes between the SMTP envelope address (`from`, `to`)
                and message headers (`headerfrom` for the `From:` header, `replyto` for `Reply-To:`).
                These may differ when a message is sent on behalf of another address.


                The `mailid` parameter corresponds to the `id` field in the returned `MailLogEntry`
                objects, **not** the `_id` field.  It also matches the transaction ID returned in
                the `text` field of a successful send response from `/mail/send`, `/mail/advsend`,
                or `/mail/rawsend`.


                The `messageId` parameter searches the `Message-ID` email header (case-insensitive
                substring match).
            operationId: viewMailLog
            parameters:
                -
                    name: id
                    in: query
                    required: false
                    description: >-
                        The numeric ID of the mail order to filter by.  When omitted, logs from
                        the first active mail order are returned.  Obtain valid IDs from
                        `GET /mail` or `GET /mail/{id}`.
                    schema:
                        type: integer
                        format: int64
                    example: 2604
                -
                    name: origin
                    in: query
                    required: false
                    description: >-
                        Filter by the originating IP address from which the message was submitted
                        to the relay.  Must be a valid IPv4 or IPv6 address.
                    schema:
                        type: string
                    example: 1.2.3.4
                -
                    name: mx
                    in: query
                    required: false
                    description: >-
                        Filter by the MX hostname the relay attempted delivery to.  For example
                        `mx.google.com` would return messages destined for Gmail recipients.
                        Maps to `mxHostname` in the `MailLogEntry` response.
                    schema:
                        type: string
                    example: mx.google.com
                -
                    name: from
                    in: query
                    required: false
                    description: >-
                        Filter by SMTP envelope `MAIL FROM` address (exact match).  This is the
                        address the relay used for bounce handling and may differ from the
                        `From:` message header.  For header-level filtering use `headerfrom`.
                    schema:
                        type: string
                        format: email
                    example: me@sender.com
                -
                    name: to
                    in: query
                    required: false
                    description: >-
                        Filter by SMTP envelope `RCPT TO` address (exact match).  This is the
                        delivery address used by the relay and may differ from the `To:` header
                        when BCC recipients are involved.
                    schema:
                        type: string
                        format: email
                    example: you@receiver.com
                -
                    name: subject
                    in: query
                    required: false
                    description: >-
                        Filter by email `Subject` header (exact match).  To search for a
                        substring, include it in the full subject text.
                    schema:
                        type: string
                    example: 'Your order has shipped'
                -
                    name: mailid
                    in: query
                    required: false
                    description: >-
                        Filter by the relay-assigned mail ID string (exact match).  This
                        corresponds to the `id` field in `MailLogEntry` and to the `text`
                        value returned by the sending endpoints on success.  Format is an
                        18–19 character hexadecimal string such as `185997065c60008840`.
                    schema:
                        type: string
                        minLength: 18
                        maxLength: 19
                    example: 185997065c60008840
                -
                    name: messageId
                    in: query
                    required: false
                    description: >-
                        Filter by the `Message-ID` email header using a substring (case-insensitive)
                        match.  The `Message-ID` is assigned by the sending mail client and is
                        visible in the `messageId` field of `MailLogEntry`.  Useful when you know
                        the message ID generated by your application but not the relay `mailid`.
                    schema:
                        type: string
                    example: '<abc123@yourdomain.com>'
                -
                    name: replyto
                    in: query
                    required: false
                    description: >-
                        Filter by the `Reply-To` message header address (exact match).  Only
                        returns messages where this header was explicitly set.
                    schema:
                        type: string
                        format: email
                    example: replies@sender.com
                -
                    name: headerfrom
                    in: query
                    required: false
                    description: >-
                        Filter by the `From` message header address (exact match).  This is
                        the human-visible sender address and may differ from the SMTP envelope
                        `from` parameter when sending on behalf of another address.
                    schema:
                        type: string
                        format: email
                    example: newsletter@sender.com
                -
                    name: delivered
                    in: query
                    required: false
                    description: >-
                        Filter by delivery status.  `1` returns only messages that were
                        successfully delivered to the destination MX.  `0` returns messages
                        that are still queued, deferred, or failed.  Omit to return all messages
                        regardless of delivery status.
                    schema:
                        title: DeliveredStatus
                        type: integer
                        enum:
                            - 0
                            - 1
                        x-enum-varnames:
                            - NotDelivered
                            - Delivered
                    example: 1
                -
                    name: skip
                    in: query
                    required: false
                    description: >-
                        Number of records to skip for pagination.  Use in combination with
                        `limit` to page through large result sets.  Defaults to `0` (no skip).
                    schema:
                        type: integer
                        format: int32
                        default: 0
                        minimum: 0
                    example: 0
                -
                    name: limit
                    in: query
                    required: false
                    description: >-
                        Maximum number of records to return per page.  Defaults to `100`.
                        Maximum allowed value is `10000`.  The response also includes a `total`
                        field with the full matched count so you can calculate the number of pages.
                    schema:
                        type: integer
                        format: int32
                        default: 100
                        minimum: 1
                        maximum: 10000
                    example: 100
                -
                    name: startDate
                    in: query
                    required: false
                    description: >-
                        Earliest date to include.  Accepts either a Unix timestamp (integer
                        seconds since epoch) or a date string parseable by `strtotime()` such
                        as `2024-01-15` or `last monday`.  Messages with a `time` value
                        **greater than or equal to** this value will be included.
                    schema:
                        oneOf:
                            -
                                type: integer
                                format: int64
                                minimum: 0
                                maximum: 9999999999
                            -
                                type: string
                    example: 1641781008
                -
                    name: endDate
                    in: query
                    required: false
                    description: >-
                        Latest date to include.  Accepts either a Unix timestamp (integer
                        seconds since epoch) or a date string parseable by `strtotime()` such
                        as `2024-01-31` or `yesterday`.  Messages with a `time` value
                        **less than or equal to** this value will be included.
                    schema:
                        oneOf:
                            -
                                type: integer
                                format: int64
                                minimum: 0
                                maximum: 9999999999
                            -
                                type: string
                    example: 1673317008
                -
                    name: sort
                    in: query
                    required: false
                    description: >-
                        Field to sort results by.  Currently only `time` is supported (sorts
                        by internal row ID which corresponds to chronological order).
                    schema:
                        type: string
                        default: time
                        enum:
                            - time
                    example: time
                -
                    name: dir
                    in: query
                    required: false
                    description: >-
                        Sort direction.  `desc` returns newest first (default), `asc` returns
                        oldest first.
                    schema:
                        type: string
                        default: desc
                        enum:
                            - asc
                            - desc
                    example: desc
                -
                    name: groupby
                    in: query
                    required: false
                    description: >-
                        Controls how results are grouped.  `recipient` (default) returns one
                        row per delivery attempt — a message sent to 4 recipients produces 4
                        rows, each with its own `recipient`, `delivered`, `response`, and
                        delivery metadata.  `message` collapses to one row per unique message
                        ID; delivery-level fields will reflect one arbitrary recipient per
                        message.  The `total` count in the response matches the grouping mode.
                    schema:
                        type: string
                        default: recipient
                        enum:
                            - message
                            - recipient
                    example: recipient
            responses:
                '200':
                    description: Paginated list of mail log entries
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MailLog'
                            examples:
                                MailLogRecipientExample:
                                    summary: groupby=recipient (default) - one row per delivery attempt
                                    value:
                                        total: 4
                                        skip: 0
                                        limit: 100
                                        emails:
                                            -
                                                _id: 103172
                                                id: 17c7eda538e0005d03
                                                from: person@mysite.com
                                                to: client@isp.com
                                                subject: sell 0.005 shares
                                                messageId: '<vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>'
                                                created: '2021-10-14 08:50:10'
                                                time: 1634215809
                                                user: mb5658
                                                transtype: ESMTPSA
                                                origin: 199.231.189.154
                                                interface: feeder
                                                sendingZone: interserver
                                                bodySize: 63
                                                seq: 1
                                                delivered: 1
                                                code: 250
                                                recipient: client@isp.com
                                                domain: interserver.net
                                                locked: 1
                                                lockTime: '1634215818533'
                                                assigned: relay1
                                                queued: '2021-10-14T12:50:15.487Z'
                                                mxHostname: mx.j.is.cc
                                                response: '250 2.0.0 Ok queued as C91D83E128C'
                                MailLogMessageExample:
                                    summary: groupby=message - one row per message
                                    value:
                                        total: 1
                                        skip: 0
                                        limit: 100
                                        emails:
                                            -
                                                _id: 103172
                                                id: 17c7eda538e0005d03
                                                from: person@mysite.com
                                                to: client@isp.com
                                                subject: sell 0.005 shares
                                                messageId: '<vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>'
                                                created: '2021-10-14 08:50:10'
                                                time: 1634215809
                                                user: mb5658
                                                transtype: ESMTPSA
                                                origin: 199.231.189.154
                                                interface: feeder
                                                sendingZone: interserver
                                                bodySize: 63
                                                seq: 1
                                                delivered: 1
                                                code: 250
                                                recipient: client@isp.com
                                                domain: interserver.net
                                                locked: 1
                                                lockTime: '1634215818533'
                                                assigned: relay1
                                                queued: '2021-10-14T12:50:15.487Z'
                                                mxHostname: mx.j.is.cc
                                                response: '250 2.0.0 Ok queued as C91D83E128C'
                    links:
                        delistSenderBlock:
                            operationId: delistBlock
                            parameters:
