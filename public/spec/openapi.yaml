    /mail/stats:
        get:
            tags:
                - History
            summary: Account usage statistics
            description: >
                Returns aggregate sending statistics for your mail account(s) across a selectable
                time window.  Useful for dashboards, billing reviews, and detecting unusual
                traffic patterns.


                The response includes:

                - **`usage`** — total messages accepted by the relay during the current billing
                  cycle (used for cost calculation).
                - **`cost`** — estimated cost for the billing cycle based on the base plan price
                  plus per-email charges.
                - **`received`** / **`sent`** — count of messages accepted by the relay /
                  successfully delivered to the destination MX within the selected `time` window.
                - **`volume`** — top-500 breakdown of message counts grouped by source IP (`ip`),
                  destination address (`to`), and sender address (`from`) within the selected window.


                **Time windows** (controlled by the `time` parameter):

                | Value | Window |
                |-------|--------|
                | `1h` | Last 1 hour (default) |
                | `24h` | Last 24 hours |
                | `7d` | Last 7 days |
                | `month` | Current calendar month (1st to now) |
                | `day` | Today (midnight to now) |
                | `billing` | Current billing cycle (last invoice date to next invoice date) |
                | `all` | All time |
            operationId: getStats
            parameters:
                -
                    name: time
                    in: query
                    required: false
                    description: >-
                        The time window to scope `received`, `sent`, and `volume` statistics.
                        Does not affect `usage` or `cost`, which are always calculated over the
                        current billing cycle.  Defaults to `1h`.
                    schema:
                        type: string
                        default: 1h
                        enum:
                            - all
                            - billing
                            - month
                            - 7d
                            - 24h
                            - day
                            - 1h
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MailStatsType'
                            examples:
                                StatsExample:
                                    value:
                                        time: all
                                        usage: 55
                                        currency: USD
                                        cost: 1.02
                                        received: 508
                                        sent: 495
                                        volume:
                                            to:
                                                client@domain.com: 395
                                                user@site.net: 57
                                            from:
                                                billing@somedomain.com: 369
                                            ip:
                                                1.1.1.1: 142
                                                2.2.2.2: 132
                '401':
                    $ref: '#/components/responses/Unauthorized'
    /mail/blocks:
        get:
            tags:
                - Blocking
            summary: Displays a list of blocked email addresses
            description: >
                Returns addresses and messages that have been flagged by the spam filtering
                system for your mail account(s).  Three categories are returned:


                - **`local`** — messages flagged by the `LOCAL_BL_RCPT` rspamd rule.  These are
                  messages sent to recipients on your account's local block list.
                - **`mbtrap`** — messages flagged by the `MBTRAP` rspamd rule.  These are messages
                  that triggered MailBaby's internal trap / honeypot detection.
                - **`subject`** — senders whose recent messages contain spam-indicative subjects
                  (strings containing `@`, `smtp`, `socks4`, or `socks5`) with high repetition
                  (more than 4 identical subjects from the same sender in the last 3 days).


                The `local` and `mbtrap` results cover the last 5 days.  The `subject` results
                cover the last 3 days.


                A sender address returned in any of these lists can be delisted using
                `POST /mail/blocks/delete` with the `email` field set to that address.
            operationId: getMailBlocks
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MailBlocks'
                            examples:
                                MailBlocksExample:
                                    value:
                                        local:
                                            -
                                                date: '2023-08-07'
                                                from: user@domain.com
                                                messageId: pFaRqFUEWkucjhTuIzYuoAgWU@domain.com
                                                subject: Test Email
                                                to: "['client@site.com']"
                                        mbtrap:
                                            -
                                                date: '2023-08-07'
                                                from: user@domain.com
                                                messageId: pFaRqFUEWkucjhTuIzYuoAgWU@domain.com
                                                subject: Test Email
                                                to: "['client@site.com']"
                                        subject:
                                            -
                                                from: user@domain.com
                                                subject: Test Email
                    links:
                        delistBlockLink:
                            operationId: delistBlock
                            parameters:
                                email: '$response.body#/local/0/from'
                            description: >-
                                The `from` address in any block list entry can be passed as the
                                `email` field to `POST /mail/blocks/delete` to delist it.
                '401':
                    $ref: '#/components/responses/Unauthorized'
    /mail/blocks/delete:
        post:
            tags:
                - Blocking
            summary: Removes an email address from the block lists
            description: >
                Delists an email address from all three block list stores:

                1. The rspamd spam-filter database (`fromemail` / envelope sender records).
                2. The MailChannels integration block table.
                3. The MailBaby internal block table.


                Use `GET /mail/blocks` to discover which addresses are currently blocked.  The
                `from` field in any returned block entry is a valid input for this call.


                **Note:** Delisting an address removes it from the block tracking databases but
                does not prevent the spam filter from re-blocking it if future messages continue
                to trigger filter rules.
            operationId: delistBlock
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/EmailAddressParam'
                        examples:
                            BlocksDeleteExample:
                                value:
                                    email: client@domain.com
                    multipart/form-data:
                        schema:
                            $ref: '#/components/schemas/EmailAddressParam'
                        examples:
                            BlocksDeleteExampleForm:
                                value:
                                    email: client@domain.com
            responses:
                '200':
                    description: Address successfully delisted
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GenericResponse'
                            examples:
                                DelistSuccess:
                                    value:
                                        status: ok
                                        text: record deleted
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
    /mail/rules:
        get:
            tags:
                - Blocking
            summary: Displays a listing of deny email rules
            description: >
                Returns all deny rules you have configured for your active mail account(s).
                Deny rules are evaluated **before** a message is transmitted and cause it to be
                rejected immediately when it matches.


                Four rule types are supported:

                | `type` | `data` format | Effect |
                |--------|---------------|--------|
                | `email` | `user@domain.com` | Rejects any message from this exact sender address |
                | `domain` | `domain.com` | Rejects any message from any address at this domain |
                | `destination` | `user@domain.com` | Rejects any message addressed to this recipient |
                | `startswith` | `prefix` | Rejects any message whose sender address begins with this string (alphanumeric, `+`, `_`, `.`, `-` only) |


                Use `POST /mail/rules` to add new rules and `DELETE /mail/rules/{ruleId}` to
                remove them.  The `id` field in each returned record is the value needed for the
                delete call.
            operationId: getRules
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/DenyRuleRecord'
                            examples:
                                ExampleMailRulesList:
                                    value:
                                        -
                                            id: '14'
                                            user: mb20682
                                            type: email
                                            data: domeinwo@server.guesshost.net
                                            created: '2022-03-22 19:16:35'
                                        -
                                            id: '15'
                                            user: mb20682
                                            type: domain
                                            data: guesshost.net
                                            created: '2022-03-22 19:18:01'
                    links:
                        deleteRuleLink:
                            operationId: deleteRule
                            parameters:
                                ruleId: '$response.body#/0/id'
                            description: >-
                                The `id` value returned in the response can be used as the
                                `ruleId` path parameter in `DELETE /mail/rules/{ruleId}`.
                '401':
                    $ref: '#/components/responses/Unauthorized'
        post:
            tags:
                - Blocking
            summary: Creates a new email deny rule
            description: >
                Adds a deny rule to block specific senders, domains, destinations, or sender
                prefixes from being relayed through your mail account.


                The `type` field selects the matching strategy:

                - **`email`** — exact match against the SMTP envelope `MAIL FROM` address.
                - **`domain`** — matches any sender address at the specified domain.
                - **`destination`** — exact match against the SMTP envelope `RCPT TO` address.
                - **`startswith`** — matches any sender address whose local-part (the portion
                  before the `@`) starts with the given string.  Only alphanumeric characters
                  and `+`, `_`, `.`, `-` are permitted in the prefix.


                If `username` is provided it must be the SMTP username of one of your active
                mail orders (e.g. `mb20682`).  If omitted the rule is associated with your first
                active order.


                On success the response `text` field contains the newly created rule's `id`,
                which can later be passed to `DELETE /mail/rules/{ruleId}` to remove it.
            operationId: addRule
            requestBody:
                required: true
                description: Fields required to create a new email deny rule.
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            $ref: '#/components/schemas/DenyRuleNew'
                        examples:
                            DenyEmailForm:
                                summary: Block a specific sender
                                value:
                                    type: email
                                    data: spammer@badactor.net
                            DenyDomainForm:
                                summary: Block an entire domain
                                value:
                                    type: domain
                                    data: badactor.net
                            DenyStartsWithForm:
                                summary: Block sender prefix
                                value:
                                    type: startswith
                                    data: noreply-spam
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DenyRuleNew'
                        examples:
                            DenyRuleNewJsonExample:
                                value:
                                    user: mb20682
                                    type: email
                                    data: domeinwo@server.guesshost.net
            responses:
                '200':
                    description: Rule created successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GenericResponse'
                            examples:
                                AddRuleSuccess:
                                    value:
                                        status: ok
                                        text: '42'
                    links:
                        deleteCreatedRule:
                            operationId: deleteRule
                            parameters:
                                ruleId: '$response.body#/text'
                            description: >-
                                The rule `id` returned in `text` can be passed as `ruleId` to
                                `DELETE /mail/rules/{ruleId}` to remove this rule.
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
    '/mail/rules/{ruleId}':
        delete:
            tags:
                - Blocking
            summary: Removes a deny mail rule
            description: >
                Permanently removes a single deny rule identified by its numeric `ruleId`.


                The `ruleId` is the `id` field returned by `GET /mail/rules` or the `text` field
                from a successful `POST /mail/rules` response.


                Only rules belonging to your own active mail account(s) can be deleted — the
                server will reject attempts to delete rules that belong to a different account.
            operationId: deleteRule
            parameters:
                -
                    name: ruleId
                    in: path
                    required: true
                    description: >-
                        The numeric ID of the deny rule to delete.  Obtain this from the `id`
                        field in `GET /mail/rules` or the `text` field of a `POST /mail/rules`
                        response.
                    schema:
                        type: integer
                    examples:
                        RuleIdExample:
                            value: 34
            responses:
                '200':
                    description: Rule deleted successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GenericResponse'
                            examples:
                                DeleteSuccess:
                                    value:
                                        status: ok
                                        text: record deleted
                '400':
                    $ref: '#/components/responses/BadInput'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '404':
                    $ref: '#/components/responses/NotFound'
components:
    schemas:
        SendMailTo:
            title: SendMailTo
            description: >-
                The primary recipient address for a simple send request.
                Accepts a single email address string or an array of email
                address strings for multiple recipients.
            oneOf:
                -
                    type: string
                    format: email
                    description: Single recipient email address.
                    example: johndoe@company.com
                -
                    type: array
                    items:
                        type: string
                        format: email
                    description: Multiple recipient email addresses.
                    example:
                        - johndoe@company.com
                        - janedoe@company.com
            example: johndoe@company.com
        GenericResponse:
            title: GenericResponse
            description: >-
                Standard success response returned by write operations (send, add rule, delete,
                etc.).  The `status` field is always `"ok"` on success.  The `text` field carries
                operation-specific data — for sending calls it contains the relay transaction ID;
                for create calls it contains the new record's ID; for delete calls it contains a
                confirmation string.
            type: object
            properties:
                status:
                    type: string
                    description: Always `"ok"` on success.
                    example: ok
                text:
                    type: string
                    description: >-
                        Operation-specific result string.  For send operations this is the relay
                        transaction ID (e.g. `185caa69ff7000f47c`) which can be used as the
                        `mailid` parameter in `GET /mail/log`.  For create operations this is the
                        new record's numeric ID.  For delete operations this is a human-readable
                        confirmation.
                    example: 185caa69ff7000f47c
        ErrorMessage:
            title: ErrorMessage
            description: The response body returned when an error occurs.
            required:
                - code
                - message
            type: object
            properties:
                code:
                    type: integer
                    format: int32
                    description: The HTTP-style status code associated with the error.
                    example: 400
                message:
                    type: string
                    description: A human-readable description of the error.
                    example: The specified ID was invalid.
            example:
                code: 400
                message: There was an error.
        MailOrder:
            title: MailOrder
            description: >-
                A mail service order record.  Each order represents one provisioned sending
                account with a dedicated SMTP username.  The `id` is the numeric identifier used
                across most API calls.  The `username` is always `mb<id>` and is the SMTP AUTH
                username for `relay.mailbaby.net`.
            required:
                - status
                - id
                - username
            type: object
            properties:
                id:
                    type: integer
                    format: int32
                    description: >-
                        The unique numeric ID of the mail order.  Used as the `id` parameter
                        on sending calls, log queries, and stats queries.
                    example: 21472
                status:
                    type: string
                    description: >-
                        The current order status.  Only `active` orders can be used for sending.
                        `canceled` orders are retained for history but cannot send.
                    example: active
                username:
                    type: string
                    description: >-
                        The SMTP AUTH username for this order, always in the format `mb<id>`.
                        Use together with the password from `GET /mail/{id}` to authenticate
                        directly against `relay.mailbaby.net:25` if needed.
                    example: mb21472
                comment:
                    type: string
                    description: Optional human-readable note associated with the order.
            example:
                id: 21472
                status: active
                username: mb21472
        MailOrderDetail:
            title: MailOrderDetail
            description: >-
                Extended mail order record including the current SMTP password.  Returned by
                `GET /mail/{id}`.  The `username` and `password` fields can be used to
                authenticate directly against `relay.mailbaby.net:25` via SMTP AUTH if you
                prefer to send via a native SMTP client rather than the REST API.
            allOf:
                -
                    $ref: '#/components/schemas/MailOrder'
                -
                    type: object
                    required:
                        - password
                    properties:
                        password:
                            type: string
                            description: >-
                                The current SMTP AUTH password for this mail order.  Use with
                                the `username` field to authenticate against
                                `relay.mailbaby.net:25`.
                            example: s3cr3tpassword
            example:
                id: 21472
                status: active
                username: mb21472
                password: s3cr3tpassword
        EmailAddressName:
            title: EmailAddressName
            description: >-
                An email contact with an optional display name.  Used in structured address fields
                (`from`, `to`, `cc`, `bcc`, `replyto`) in `SendMailAdv`.
            required:
                - email
            type: object
            properties:
                email:
                    type: string
                    format: email
                    description: The email address.
                    example: user@domain.com
                name:
                    type: string
                    description: Optional display name shown to recipients (e.g. in the `From:` header).
                    example: John Smith
            example:
                email: user@domain.com
                name: John Smith
        EmailAddressNames:
            title: EmailAddressNames
            description: An array of email contacts, each with an email address and optional display name.
            type: array
            items:
                $ref: '#/components/schemas/EmailAddressName'
            example:
                -
                    email: user@domain.com
                    name: John Smith
        EmailAddressParam:
            title: EmailAddressParam
            description: >-
                A single email address parameter used as the body of `POST /mail/blocks/delete`.
            type: object
            required:
                - email
            properties:
                email:
                    type: string
                    format: email
                    description: The email address to delist from all block lists.
                    example: user@domain.com
            example:
                email: user@domain.com
        EmailAddressesTypes:
            title: EmailAddressesTypes
            description: >-
                A flexible email address list that accepts either a plain RFC 822 string or a
                structured array of contact objects.  When a string is provided it is parsed as
                a comma-separated list of RFC 822 addresses (supporting the `"Name <email>"` and
                bare `email` formats).  When an array is provided each entry must have at least
                an `email` field with an optional `name` field.
            oneOf:
                -
                    title: EmailAddressString
                    type: string
                    format: email
                    description: >-
                        A single email address or RFC 822 comma-separated list.
                        Example: `"joe@example.com"` or `"Joe <joe@example.com>, jane@example.com"`.
                    example: 'Joe <joe@example.com>'
                -
                    $ref: '#/components/schemas/EmailAddressNames'
        EmailAddressTypes:
            title: EmailAddressTypes
            description: >-
                A flexible single email address that accepts either a plain address string, an
                RFC 822 named-address string (`"Name <email>"`), or a structured contact object.
            oneOf:
                -
                    title: EmailAddressSingleString
                    type: string
                    description: >-
                        A single email address or RFC 822 named-address string.
                        Example: `"user@domain.com"` or `"Joe <user@domain.com>"`.
                    example: 'Joe <user@domain.com>'
                -
                    $ref: '#/components/schemas/EmailAddressName'
        SendMail:
            title: SendMail
            description: >-
                Request body for `POST /mail/send`.  Sends a simple single-recipient message.
                HTML detection is automatic — if `body` contains HTML tags the message is sent
                as `text/html`; otherwise as `text/plain`.  The `from` address is automatically
                set as both the `From` and `Reply-To` headers.


                For multiple recipients, CC/BCC, attachments, or per-field Reply-To control,
                use `POST /mail/advsend` instead.
            required:
                - to
                - from
                - subject
                - body
            type: object
            properties:
                to:
                    $ref: '#/components/schemas/SendMailTo'
                from:
                    type: string
                    format: email
                    description: >-
                        The sender address.  This is used as both the `From` header and the
                        `Reply-To` header automatically.  Must be a valid email address authorized
                        for your mail order.
                    example: janedoe@company.com
                subject:
                    type: string
                    description: The subject line of the email.
                    example: Attention Client
                body:
                    type: string
                    description: >-
                        The email body.  If the string contains any HTML tags the message is
                        automatically sent as `text/html`; otherwise it is sent as `text/plain`.
                    example: 'This is an email to inform you that something noteworthy happened.'
                id:
                    type: integer
                    format: int64
                    description: >-
                        Optional numeric ID of the mail order to send through.  If omitted the
                        first active order on your account is used automatically.  Valid IDs are
                        returned by `GET /mail`.
                    example: 2604
            example:
                to: johndoe@company.com
                from: janedoe@company.com
                subject: Attention Client
                body: 'This is an email to inform you that something noteworthy happened.'
        SendMailAdv:
            title: SendMailAdv
            description: >-
                Request body for `POST /mail/advsend`.  Provides full control over all email
                headers and supports multiple recipients, CC, BCC, Reply-To, and file attachments.


                Address fields (`from`, `to`, `replyto`, `cc`, `bcc`) each accept either a plain
                RFC 822 string (e.g. `"Joe <joe@example.com>"` or a comma-separated list) or a
                structured array of `{"email": "...", "name": "..."}` objects.


                HTML detection is automatic based on whether `body` contains HTML tags.
            required:
                - from
                - to
                - subject
                - body
            type: object
            properties:
                subject:
                    type: string
                    description: The subject line of the email.
                    example: 'Your Package has been Delivered!'
                body:
                    type: string
                    description: >-
                        The email body.  If the string contains any HTML tags the message is
                        automatically sent as `text/html`; otherwise it is sent as `text/plain`.
                    example: 'The package you ordered on 2021-01-23 has been delivered.'
                from:
                    $ref: '#/components/schemas/EmailAddressTypes'
                    description: >-
                        The sender address.  Accepts a plain email string, an RFC 822 named
                        string (`"Name <email>"`), or a `{"email": "...", "name": "..."}` object.
                to:
                    $ref: '#/components/schemas/EmailAddressesTypes'
                    description: >-
                        One or more destination addresses.  Accepts a comma-separated RFC 822
                        string or an array of contact objects.
                replyto:
                    $ref: '#/components/schemas/EmailAddressesTypes'
                    description: >-
                        Optional.  One or more addresses to set as the `Reply-To` header.
                        When recipients reply to the message their email client will address
                        the reply to these addresses instead of `from`.
                cc:
                    $ref: '#/components/schemas/EmailAddressesTypes'
                    description: >-
                        Optional.  Carbon-copy recipients.  These addresses are listed in the
                        `Cc` header and are visible to all recipients.
                bcc:
                    $ref: '#/components/schemas/EmailAddressesTypes'
                    description: >-
                        Optional.  Blind-carbon-copy recipients.  These addresses receive the
                        message but are not listed in any visible header.
                attachments:
                    type: array
                    items:
                        $ref: '#/components/schemas/MailAttachment'
                    description: >-
                        Optional list of file attachments.  Each file must be base64-encoded.
                        Include `filename` so recipients see a meaningful attachment name.
                id:
                    type: integer
                    format: int64
                    description: >-
                        Optional numeric ID of the mail order to send through.  If omitted the
                        first active order on your account is used automatically.  Valid IDs are
                        returned by `GET /mail`.
                    example: 5000
            example:
                subject: Welcome
                body: Hello
                from: user@domain.com
                to: someone@client.com
                cc:
                    -
                        email: someone2@client.com
                        name: Mr Client
                attachments:
                    -
                        filename: file.txt
                        data: base64_encoded_contents
                id: 66
        SendMailRaw:
            title: SendMailRaw
            description: >-
                Request body for `POST /mail/rawsend`.  Accepts a complete RFC 822 message
                (all headers and body) as a verbatim string.  The relay injects it without
                modification, preserving any existing `DKIM-Signature` header intact.


                The `From`, `To`, `Cc`, and `Bcc` addresses are extracted from the message
                headers automatically — you do not need to specify them separately.
            required:
                - raw_email
            type: object
            properties:
                raw_email:
                    type: string
                    description: >-
                        The complete RFC 822 email message including all headers and the body.
                        Must include at minimum `From`, `To`, `Subject`, `Date`, and
                        `MIME-Version` headers.  DKIM signatures in the `DKIM-Signature` header
                        are transmitted verbatim and will pass verification at the destination.
                id:
                    type: integer
                    format: int64
                    description: >-
                        Optional numeric ID of the mail order to use for SMTP authentication.
                        If omitted the first active order on your account is used.  Valid IDs
                        are returned by `GET /mail`.
            example:
                id: 39
                raw_email: |
                    Date: Sun, 16 Nov 2025 14:30:11 -0500
                    To: Me <support@interserver.net>
                    From: Mail Test <support@interserver.net>
                    Reply-To: Mail Test <support@interserver.net>
                    Subject: testing out raw email api call
                    Message-ID: <9jeLkYQIw7KqYnoiCnnYj7EC0IrSHdp8XMuJq9a5qs@interserver.net>
                    MIME-Version: 1.0
                    Content-Type: text/plain; charset=utf-8
                    DKIM-Signature: v=1; d=interserver.net; s=my; a=rsa-sha256; ...

                    This is a test of the rawsend API call.
        MailAttachment:
            title: MailAttachment
            description: >-
                A file attachment for use with `POST /mail/advsend`.  The file content must be
                base64-encoded.  The `filename` is shown to recipients in their email client.
            required:
                - data
                - filename
            type: object
            properties:
                filename:
                    type: string
                    description: The filename shown to recipients (e.g. `report.pdf`, `invoice.xlsx`).
                    example: message.txt
                data:
                    type: string
                    format: byte
                    description: >-
                        The file contents as a base64-encoded string.  Decode this to retrieve
                        the original binary file.
                    example: aGVsbG8gdGhlcmUK
            example:
                filename: file.txt
                data: base64_encoded_file_contents
        MailBlocks:
            title: MailBlocks
            description: >-
                The complete set of blocked addresses and message patterns returned by
                `GET /mail/blocks`.  Three independent block sources are combined into one response.
                Use `POST /mail/blocks/delete` with a `from` address from any entry to delist it.
            required:
                - local
                - mbtrap
                - subject
            type: object
            properties:
                local:
                    type: array
                    description: >-
                        Messages flagged by the `LOCAL_BL_RCPT` rspamd rule in the last 5 days.
                        These are messages sent to recipients on a local block list.
                    items:
                        $ref: '#/components/schemas/MailBlockClickHouse'
                mbtrap:
                    type: array
                    description: >-
                        Messages flagged by the `MBTRAP` rspamd rule in the last 5 days.
                        These triggered MailBaby's honeypot / trap address detection.
                    items:
                        $ref: '#/components/schemas/MailBlockClickHouse'
                subject:
                    type: array
                    description: >-
                        Senders whose messages contained spam-indicative subjects (containing
                        `@`, `smtp`, `socks4`, or `socks5`) with more than 4 occurrences of
                        the same subject in the last 3 days.
                    items:
                        $ref: '#/components/schemas/MailBlockRspamd'
        MailBlockClickHouse:
            title: MailBlockClickHouse
            description: >-
                A block event record sourced from the ClickHouse analytics store.  Represents a
                message that triggered one of the rspamd block rules (`LOCAL_BL_RCPT` or `MBTRAP`).
                The `from` address can be passed to `POST /mail/blocks/delete` to delist it.
            required:
                - date
                - from
                - subject
                - to
            type: object
            properties:
                date:
                    type: string
                    format: date
                    description: The date the block event was recorded.
                    example: '2023-08-07'
                from:
                    type: string
                    description: >-
                        The SMTP envelope sender (`MAIL FROM`) address of the blocked message.
                        Pass this value as `email` to `POST /mail/blocks/delete` to delist it.
                    example: user@domain.com
                messageId:
                    type: string
                    description: >-
                        The `Message-ID` header of the blocked message, or `null` if not present.
                    nullable: true
                    example: pFaRqFUEWkucjhTuIzYuoAgWU@domain.com
                subject:
                    type: string
                    description: The `Subject` header of the blocked message.
                    example: Test Email
                to:
                    type: string
                    description: The serialized list of recipients of the blocked message.
                    example: "['client@site.com']"
            example:
                date: '2023-08-07'
                from: user@domain.com
                messageId: pFaRqFUEWkucjhTuIzYuoAgWU@domain.com
                subject: Test Email
                to: "['client@site.com']"
        MailBlockRspamd:
            title: MailBlockRspamd
            description: >-
                A block pattern sourced from the rspamd database.  Represents a sender whose
                recent messages contained suspicious subject lines (e.g. containing relay/proxy
                strings) repeated more than 4 times in the last 3 days.
                The `from` address can be passed to `POST /mail/blocks/delete` to delist it.
            required:
                - subject
                - from
            type: object
            properties:
                from:
                    type: string
                    description: >-
                        The sender email address.  Pass this value as `email` to
                        `POST /mail/blocks/delete` to delist the sender.
                    example: user@domain.com
                subject:
                    type: string
                    description: The suspicious subject pattern that triggered the block.
                    example: Test email
            example:
                from: user@domain.com
                subject: Test email
        DenyRuleRecord:
            title: DenyRuleRecord
            description: >-
                A complete deny rule record as returned by `GET /mail/rules`.  Combines the
                rule definition fields (`DenyRuleNew`) with server-assigned metadata (`id` and
                `created`).  The `id` value is required by `DELETE /mail/rules/{ruleId}`.
            allOf:
                -
                    type: object
                    required:
                        - id
                        - created
                    properties:
                        id:
                            type: string
                            description: >-
                                The numeric ID of the deny rule, as a string.  Pass this as
                                `ruleId` to `DELETE /mail/rules/{ruleId}` to remove the rule.
                            example: '41124'
                        created:
                            type: string
                            format: date-time
                            description: The timestamp when the rule was created.
                            example: '2022-03-22 19:16:35'
                -
                    $ref: '#/components/schemas/DenyRuleNew'
            example:
                id: '14'
                user: mb20682
                type: email
                data: domeinwo@server.guesshost.net
                created: '2022-03-22 19:16:35'
        DenyRuleNew:
            title: DenyRuleNew
            description: >-
                The fields required to create a new email deny rule via `POST /mail/rules`.
                The `type` controls what `data` is matched against:

                - `email` — exact sender address match
                - `domain` — all senders from a domain
                - `destination` — exact recipient address match
                - `startswith` — sender local-part prefix match (alphanumeric + `+_.-` only)
            required:
                - type
                - data
            type: object
            properties:
                user:
                    type: string
                    description: >-
                        Optional SMTP username of the mail order to associate this rule with
                        (e.g. `mb20682`).  If omitted the first active order is used.  Valid
                        usernames are the `username` values returned by `GET /mail`.
                    example: mb20682
                type:
                    type: string
                    description: The type of deny rule.
                    enum:
                        - domain
                        - email
                        - startswith
                        - destination
                    example: email
                data:
                    type: string
                    description: >-
                        The value to match against, interpreted according to `type`:
                        a full email address for `email`/`destination`, a domain name for
                        `domain`, or an alphanumeric prefix string for `startswith`.
                    example: domeinwo@server.guesshost.net
            example:
                user: mb20682
                type: email
                data: domeinwo@server.guesshost.net
        MailLog:
            title: MailLog
            description: >-
                Paginated mail log response returned by `GET /mail/log`.  Contains the full
                matched count (`total`) plus a page of `MailLogEntry` records.  Use `skip` and
                `limit` to page through large result sets.
            required:
                - total
                - skip
                - limit
                - emails
            type: object
            properties:
                total:
                    type: integer
                    description: >-
                        Total number of log entries that match the supplied filters, regardless
                        of `skip` and `limit`.  Use this to calculate the number of pages:
                        `ceil(total / limit)`.
                    example: 10234
                skip:
                    type: integer
                    description: The `skip` value used for this page (echoed from the request).
                    example: 0
                limit:
                    type: integer
                    description: The `limit` value used for this page (echoed from the request).
                    example: 100
                emails:
                    type: array
                    items:
                        $ref: '#/components/schemas/MailLogEntry'
        MailLogEntry:
            title: MailLogEntry
            description: >-
                A single email record in the mail log.  Combines data from the message store
                (envelope metadata), the queue release table (delivery status and response), and
                the sender delivery table (MX routing details).


                Key field relationships with other API calls:

                - The `id` field matches the `mailid` query parameter on `GET /mail/log` and
                  the `text` field of a successful send response.
                - The `from` address can be passed to `POST /mail/blocks/delete` to delist a
                  flagged sender.
                - The `user` field is the SMTP username (e.g. `mb5658`) corresponding to the
                  `username` field in `GET /mail` / `GET /mail/{id}`.
            required:
                - _id
                - id
                - from
                - to
                - created
                - time
                - user
                - transtype
                - origin
                - interface
            type: object
            properties:
                _id:
                    type: integer
                    description: Internal auto-increment database row ID.  Not meaningful outside the API.
                    example: 103172
                id:
                    type: string
                    description: >-
                        The relay-assigned mail ID (18–19 hex characters).  This is the value
                        returned as `text` by the sending endpoints and accepted as the `mailid`
                        filter on `GET /mail/log`.
                    example: 17c7eda538e0005d03
                from:
                    type: string
                    description: SMTP envelope `MAIL FROM` address (may differ from the `From:` header).
                    example: person@mysite.com
                to:
                    type: string
                    description: SMTP envelope `RCPT TO` address.
                    example: client@isp.com
                subject:
                    type: string
                    nullable: true
                    description: The `Subject` header value, if available.
                    example: sell 0.005 shares
                messageId:
                    type: string
                    nullable: true
                    description: >-
                        The `Message-ID` header value, if present.  Can be used with the
                        `messageId` filter on `GET /mail/log` for subsequent lookups.
                    example: '<vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>'
                created:
                    type: string
                    description: Human-readable creation timestamp in `YYYY-MM-DD HH:MM:SS` format.
                    example: '2021-10-14 08:50:10'
                time:
                    type: integer
                    description: >-
                        Unix timestamp of message acceptance.  Corresponds to the `startDate`
                        and `endDate` filter parameters on `GET /mail/log`.
                    example: 1634215809
                user:
                    type: string
                    description: >-
                        The SMTP AUTH username used to submit the message (e.g. `mb5658`).
                        Corresponds to the `username` field in `GET /mail` orders.
                    example: mb5658
                transtype:
                    type: string
                    description: SMTP transaction type negotiated with the relay (e.g. `ESMTPSA`).
                    example: ESMTPSA
                origin:
                    type: string
                    description: >-
                        IP address of the client that submitted the message to the relay.
                        Corresponds to the `origin` filter parameter on `GET /mail/log`.
                    example: 199.231.189.154
                interface:
                    type: string
                    description: Relay interface name that accepted the message (e.g. `feeder`).
                    example: feeder
                sendingZone:
                    type: string
                    nullable: true
                    description: The sending zone assigned by the relay for outbound delivery.
                    example: interserver
                bodySize:
                    type: integer
                    nullable: true
                    description: Size of the message body in bytes.
                    example: 63
                seq:
                    type: integer
                    nullable: true
                    description: >-
                        Sequence index of this recipient in a multi-recipient message.
                        Starts at 1.
                    example: 1
                delivered:
                    type: integer
                    nullable: true
                    description: >-
                        Delivery status flag.  `1` = successfully delivered to destination MX.
                        `0` = queued, deferred, or failed.  `null` = delivery not yet attempted.
                        Corresponds to the `delivered` filter parameter on `GET /mail/log`.
                    example: 1
                code:
                    type: integer
                    nullable: true
                    description: >-
                        The SMTP response code from the destination MX server (e.g. `250`
                        for success, `550` for permanent failure).
                    example: 250
                response:
                    type: string
                    nullable: true
                    description: >-
                        The SMTP response string received from the destination MX server upon
                        delivery attempt (e.g. `"250 2.0.0 Ok queued as C91D83E128C"`).
                    example: '250 2.0.0 Ok queued as C91D83E128C'
                recipient:
                    type: string
                    nullable: true
                    description: The specific recipient address this delivery record is for.
                    example: client@isp.com
                domain:
                    type: string
                    nullable: true
                    description: >-
                        The destination domain.  Corresponds to the `mx` filter parameter
                        (which matches `mxHostname`, not `domain`) on `GET /mail/log`.
                    example: interserver.net
                locked:
                    type: integer
                    nullable: true
                    description: Whether the queue entry is currently locked for delivery processing.
                    example: 1
                lockTime:
                    type: string
                    nullable: true
                    description: Millisecond-precision timestamp of the last queue lock acquisition.
                    example: '1634215818533'
                assigned:
                    type: string
                    nullable: true
                    description: The relay server node assigned to deliver this message.
                    example: relay1
                queued:
                    type: string
                    nullable: true
                    description: ISO 8601 timestamp when the message was placed into the delivery queue.
                    example: '2021-10-14T12:50:15.487Z'
                mxHostname:
                    type: string
                    nullable: true
                    description: >-
                        The MX hostname the relay connected to for delivery.  Corresponds to
                        the `mx` filter parameter on `GET /mail/log`.
                    example: mx.j.is.cc
            example:
                _id: 103172
                id: 17c7eda538e0005d03
                from: person@mysite.com
                to: client@isp.com
                subject: sell 0.005 shares
                messageId: '<vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>'
                created: '2021-10-14 08:50:10'
                time: 1634215809
                user: mb5658
                transtype: ESMTPSA
                origin: 199.231.189.154
                interface: feeder
                sendingZone: interserver
                bodySize: 63
                seq: 1
                delivered: 1
                code: 250
                recipient: client@isp.com
                domain: interserver.net
                locked: 1
                lockTime: '1634215818533'
                assigned: relay1
                queued: '2021-10-14T12:50:15.487Z'
                mxHostname: mx.j.is.cc
                response: '250 2.0.0 Ok queued as C91D83E128C'
        MailStatsVolume:
            title: MailStatsVolume
            description: >-
                Top-500 breakdown of message counts within the selected time window,
                grouped by originating IP, destination address, and sender address.
            type: object
            properties:
                to:
                    type: object
                    description: Message counts keyed by destination (envelope `to`) email address.
                    additionalProperties:
                        type: integer
                        format: int32
                from:
                    type: object
                    description: Message counts keyed by sender (envelope `from`) email address.
                    additionalProperties:
                        type: integer
                        format: int32
                ip:
                    type: object
                    description: Message counts keyed by originating client IP address.
                    additionalProperties:
                        type: integer
                        format: int32
            example:
                to:
                    'client@domain.com': 395
                    'user@site.net': 57
                from:
                    'billing@somedomain.com': 369
                ip:
                    '1.1.1.1': 142
                    '2.2.2.2': 132
        MailStatsType:
            title: MailStatsType
            description: >-
                Account usage statistics returned by `GET /mail/stats`.  Includes billing-cycle
                usage totals (for cost calculation) as well as time-windowed sent/received counts
                and volume breakdowns by IP, destination, and source address.
            type: object
            properties:
                time:
                    type: string
                    description: The time window these `received`, `sent`, and `volume` statistics cover.
                    default: 1h
                    enum:
                        - all
                        - billing
                        - month
                        - 7d
                        - 24h
                        - day
                        - 1h
                usage:
                    type: integer
                    format: int32
                    description: >-
                        Total messages accepted during the current billing cycle.  Used to
                        calculate the `cost` value.
                currency:
                    type: string
                    description: The ISO 4217 currency code for this account (e.g. `USD`).
                cost:
                    type: number
                    format: double
                    description: >-
                        Estimated cost for the current billing cycle combining the base plan
                        price and per-email charges ($0.20/1000 emails).
                received:
                    type: integer
                    format: int32
                    description: >-
                        Count of messages accepted by the relay within the selected `time` window.
                        Includes messages still in queue.
                sent:
                    type: integer
                    format: int32
                    description: >-
                        Count of messages successfully delivered to the destination MX within
                        the selected `time` window.  Will be ≤ `received`.
                volume:
                    $ref: '#/components/schemas/MailStatsVolume'
            example:
                time: all
                usage: 55
                currency: USD
                cost: 1.02
                received: 508
                sent: 495
                volume:
                    to:
                        'client@domain.com': 395
                        'user@site.net': 57
                        'sales@company.com': 47
                    from:
                        'billing@somedomain.com': 369
                        'sales@somedomain.com': 139
                    ip:
                        '1.1.1.1': 142
                        '2.2.2.2': 132
                        '3.3.3.3': 129
    responses:
        BadInput:
            description: Bad request — one or more input parameters were missing or invalid.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorMessage'
                    examples:
                        BadInputError:
                            value:
                                code: 400
                                message: There was a problem with the input parameters.
        NotFound:
            description: The specified resource was not found or does not belong to your account.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorMessage'
                    examples:
                        NotFoundError:
                            value:
                                code: 404
                                message: The specified resource was not found.
        Unauthorized:
            description: >-
                Authentication failed.  Ensure you are sending a valid `X-API-KEY` header.
                Obtain your API key from
                [my.interserver.net/account_security](https://my.interserver.net/account_security).
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorMessage'
                    examples:
                        UnauthorizedError:
                            value:
                                code: 401
                                message: API key is missing or invalid
    securitySchemes:
        apiKeyAuth:
            type: apiKey
            description: >-
                Pass your API key in the `X-API-KEY` HTTP request header.  Obtain your key from
                the [Account Security](https://my.interserver.net/account_security) page on
                my.interserver.net.
            name: X-API-KEY
            in: header
security:
    -
        apiKeyAuth: []
tags:
    -
        name: Status
        description: Service health / uptime checks.
    -
        name: Services
        description: View and manage your MailBaby mail service orders.
    -
        name: Sending
        description: Send email via simple, advanced, or raw RFC 822 message submission.
    -
        name: Blocking
        description: >-
            Manage block lists and custom deny rules to prevent unwanted outbound email.
    -
        name: History
        description: Query sent mail logs and account usage statistics.
externalDocs:
    description: MailBaby FAQ & Tips
    url: 'https://www.mail.baby/tips/'
